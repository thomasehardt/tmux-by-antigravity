name: macOS Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        brew install tmux
        
    - name: Test Installation
      run: |
        export REPO_URL=$PWD
        bash install.sh
        
    - name: Verify Configuration
      run: |
        export PATH=$HOME/.local/bin:$PATH
        tmux-mgr status
        bash tests/test-keystrokes.sh
