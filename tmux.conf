# ==============================================================================
# ~/.tmux.conf
# ==============================================================================

# ==============================================================================
# 1. CORE GENERAL SETTINGS
# ==============================================================================

# Change the default prefix from Ctrl+b to Ctrl+a (easier to reach)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable full mouse support (click to switch panes, drag to resize/select)
set -g mouse on

# Terminal + true color: tmux-256color is the modern terminfo entry,
# and the override enables 24-bit ("true") color so colors aren't washed out
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,*:Smulx=\E[4::%p1%dm"

# Increase scrollback history limit from 2000 to 10000 lines
set -g history-limit 50000

# Snappier ESC handling so Vim does not lag after pressing Escape,
# and let apps know when the terminal gains/loses focus
set -sg escape-time 10
set -g focus-events on

# ==============================================================================
# 2. WINDOW & PANE USABILITY
# ==============================================================================

# Start window and pane numbering at 1 instead of 0 (matches keyboard layout)
set -g base-index 1
set -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Use Vim-style shortcuts for copy-mode navigation
setw -g mode-keys vi

# ==============================================================================
# 3. CUSTOM KEYBINDINGS
# ==============================================================================

# Easy config reload shortcut using Prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display-message "Configuration reloaded!"

# Split panes using logical visual cues: | for vertical, - for horizontal
# (new panes open in the current pane's working directory)
unbind '"'
unbind %
bind "|" split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Switch panes using Vim keys (Prefix + h/j/k/l)
# Note: binding l here overrides the default "last-window" shortcut,
# so last-window is remapped to Prefix + Tab below
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Tab last-window

# Resize panes with Vim-style capital keys (Prefix + H/J/K/L).
# The -r flag lets you keep resizing without re-pressing the prefix.
# Capitals avoid any clash with the lowercase select-pane bindings above.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Fast window switching using Shift + Arrow keys (no prefix needed)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Window switching with Vim-style keys (Prefix + Ctrl + j/k)
# The -r flag allows repeating without re-pressing the prefix.
# Note: C-j/C-k are distinct from the Prefix + j/k pane bindings above,
# so there is no conflict.
bind -r C-h previous-window
bind -r C-l next-window

# settings that will help with claude code
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ------------------------------------------------------------------------------
# Copy mode / clipboard (platform-agnostic)
# ------------------------------------------------------------------------------

# Two layers, so a copy always reaches the system clipboard:
#   1. set-clipboard on -> tmux emits an OSC 52 escape for every copy. This is
#      the universal path: it reaches the terminal on any OS and survives SSH.
#   2. copy-pipe to clipboard.sh -> also feeds the native local clipboard tool
#      (pbcopy / wl-copy / xclip / xsel / clip.exe) for terminals that do not
#      honor OSC 52 (e.g. macOS Terminal.app).
set -g set-clipboard on

# Vim-like selection, then yank to the system clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "$HOME/.tmux/scripts/clipboard.sh"

# Make Enter behave like y rather than just copying to the tmux buffer
unbind -T copy-mode-vi Enter
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "$HOME/.tmux/scripts/clipboard.sh"

# ==============================================================================
# 4. VISUAL DESIGN & STATUS BAR
# ==============================================================================

# Position the status bar at the bottom (change to "top" if preferred)
set-option -g status-position bottom

# Status bar colors (Catppuccin Mocha inspired)
set -g status-bg "#1e1e2e"
set -g status-fg "#cdd6f4"

# Active window tab: blue fill, dark text
setw -g window-status-current-style bg="#89b4fa",fg="#1e1e2e",bold

# Inactive window tabs: muted gray text
setw -g window-status-style fg="#a6adc8"

# Pane borders: subtle when inactive, blue for the active pane
set -g pane-border-style fg="#313244"
set -g pane-active-border-style fg="#89b4fa"

# Dim inactive panes so the active one stands out (avoids typing in the wrong pane).
# Inactive: grayed text on the darker "mantle" bg; active: normal text on base bg.
# Note: full-screen apps that paint their own background (vim, htop, less) cover
# this, which is why the blue active-border above is the always-on fallback cue.
set -g window-style        "fg=#6c7086,bg=#181825"
set -g window-active-style "fg=#cdd6f4,bg=#1e1e2e"

# Refresh the status bar every 5s so the battery and path segments stay current
set -g status-interval 5

# Left side: session name, then mode indicators that light up only when active:
#   PREFIX - you have pressed the prefix and tmux is waiting for the next key
#   COPY   - you are in copy mode
#   SYNC   - synchronize-panes is on (typing is broadcast to every pane)
set -g status-left-length 60
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] ❐ #S #[bg=#1e1e2e] "

# Right side: path, system stats (load + memory), battery, date, time
set -g status-right-length 200
set -g status-right "#[align=absolute-centre]#{?client_prefix,#[fg=#1e1e2e]#[bg=#f9e2af]#[bold] PREFIX #[default] ,}#{?pane_in_mode,#[fg=#1e1e2e]#[bg=#a6e3a1]#[bold] COPY #[default] ,}#{?pane_synchronized,#[fg=#1e1e2e]#[bg=#f38ba8]#[bold] SYNC #[default] ,}#[align=right]#[fg=#a6adc8] #{=/32/...:pane_current_path}#(~/.tmux/scripts/git-status.sh \"#{pane_current_path}\") #[fg=#6c7086]│ #[fg=#cba6f7]#(~/.tmux/scripts/sys-stats.sh) #[fg=#6c7086]│ #[fg=#f9e2af]#(~/.tmux/scripts/battery.sh) #[fg=#6c7086]│ #[fg=#94e2d5]%a %b %d #[fg=#cdd6f4,bold]%H:%M "

# Window tabs: show index, name, and any flags (e.g. * current, - last, ! activity)
set -g window-status-format " #I:#W#{?window_flags,#F,} "
set -g window-status-current-format " #I:#W#{?window_flags,#F,} "

# Color the copy-mode selection, search matches, and message/command bars
set -g mode-style "bg=#45475a,fg=#cdd6f4"
set -g copy-mode-match-style "bg=#f9e2af,fg=#1e1e2e"
set -g copy-mode-current-match-style "bg=#fab387,fg=#1e1e2e,bold"
set -g message-style "bg=#89b4fa,fg=#1e1e2e,bold"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Label each pane's border with its index and the command running in it
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=#89b4fa#,bold],#[fg=#6c7086]}#P:#{pane_current_command} #[default]"

# A blue 24-hour clock for clock mode (Prefix + t)
set -g clock-mode-colour "#89b4fa"
set -g clock-mode-style 24

# ==============================================================================
# 5. POWER FEATURES
# ==============================================================================
# All of the bindings below carry a -N description, so pressing Prefix + ?
# shows them inline in the key list. Nothing here changes the core bindings
# from sections 1-4; it only adds new ones.

# ------------------------------------------------------------------------------
# Floating popups (tmux 3.2+). These overlay the screen and vanish on exit.
# ------------------------------------------------------------------------------

# Prefix + \  : persistent floating scratch shell. It is backed by a real
# session named "scratch", so whatever you leave running is still there next
# time you open it. Great for a quick command without disturbing your layout.
bind -N "floating scratch shell" '\' \
  display-popup -E -w 80% -h 75% -d "#{pane_current_path}" "~/.tmux/scripts/scratch.sh"

# Prefix + g  : full-screen lazygit in a popup
bind -N "lazygit popup" g \
  display-popup -E -w 95% -h 95% -d "#{pane_current_path}" "if command -v lazygit >/dev/null 2>&1; then lazygit; else echo 'lazygit is not installed. Please install it to use this feature.'; read -r -p 'Press Enter to close...'; fi"

# Prefix + b  : system monitor (btm, htop, or top) in a popup
bind -N "system monitor popup" b \
  display-popup -E -w 95% -h 95% "if command -v btm >/dev/null 2>&1; then btm; elif command -v htop >/dev/null 2>&1; then htop; elif command -v top >/dev/null 2>&1; then top; else echo 'No system monitor found (btm, htop, top). Please install one.'; read -r -p 'Press Enter to close...'; fi"

# Prefix + s  : fuzzy session switcher (replaces the default session tree with
# an fzf picker). Prefix + w : fuzzy switcher across every window everywhere.
bind -N "fuzzy session switcher" s \
  display-popup -E -w 50% -h 50% "~/.tmux/scripts/sessions.sh"
bind -N "fuzzy window switcher" w \
  display-popup -E -w 70% -h 60% "~/.tmux/scripts/windows.sh"

# Prefix + u  : scrape URLs off the visible screen, pick one, open it in macOS.
bind -N "open a URL from the screen" u \
  display-popup -E -w 70% -h 60% "~/.tmux/scripts/url-open.sh #{pane_id}"

# ------------------------------------------------------------------------------
# Sessions & projects
# ------------------------------------------------------------------------------

# Prefix + f  : project launcher. fzf over every repo under ~/code (and other
# common roots); jumps to a session named after the project, creating it the
# first time. This is the single most useful binding here once you have a few
# projects on the go.
bind -N "find/launch a project session" f \
  display-popup -E -w 60% -h 60% "~/.tmux/scripts/sessionizer.sh"

# Prefix + Ctrl-s / Ctrl-r : save and restore the whole tmux server (sessions,
# windows, pane layouts, and working directories). Restore gives you fresh
# shells in the right places; it does not relaunch the programs you had open.
bind -N "save all sessions to disk" C-s \
  run-shell "~/.tmux/scripts/save-sessions.sh"
bind -N "restore saved sessions" C-r \
  run-shell "~/.tmux/scripts/restore-sessions.sh"

# ------------------------------------------------------------------------------
# Power toggles
# ------------------------------------------------------------------------------

# Prefix + S  : broadcast typing to every pane in the window (synchronize-panes).
# The SYNC badge in the status bar shows when it is on. Press again to stop.
bind -N "toggle broadcast typing (sync panes)" S \
  setw synchronize-panes \; display-message "sync #{?pane_synchronized,ON,OFF}"

# Prefix + P  : tee everything in the current pane to a log file. Press again to
# stop. Logs land in ~/.tmux/logs/<session>-<window>.log
bind -N "toggle pane logging to a file" P \
  pipe-pane -o "cat >> \$HOME/.tmux/logs/#{session_name}-#{window_index}.log" \; \
  display-message "logging #{?pane_pipe,started,stopped}: ~/.tmux/logs/#{session_name}-#{window_index}.log"

# Prefix + I  : a curated cheatsheet of everything in this config, in a popup.
# (Prefix + ? still shows the full, auto-generated key list.)
bind -N "show the cheatsheet" I \
  display-popup -E -w 80% -h 80% "~/.tmux/scripts/cheatsheet.sh"

# ------------------------------------------------------------------------------
# Discoverable actions menu (Prefix + m) and a right-click pane menu
# ------------------------------------------------------------------------------
bind -N "actions menu" m display-menu -T "#[align=centre,fg=#89b4fa,bold] tmux actions " -x C -y C \
  "Scratch shell"   "\\" "display-popup -E -w 80% -h 75% -d \"#{pane_current_path}\" \"~/.tmux/scripts/scratch.sh\"" \
  "Git overview"    "G"  "display-popup -E -w 90% -h 85% -d \"#{pane_current_path}\" \"~/.tmux/scripts/git-overview.sh\"" \
  "Switch session"  "s"  "display-popup -E -w 50% -h 50% \"~/.tmux/scripts/sessions.sh\"" \
  "Switch window"   "w"  "display-popup -E -w 70% -h 60% \"~/.tmux/scripts/windows.sh\"" \
  "Open URL"        "u"  "display-popup -E -w 70% -h 60% \"~/.tmux/scripts/url-open.sh #{pane_id}\"" \
  "Find project"    "f"  "display-popup -E -w 60% -h 60% \"~/.tmux/scripts/sessionizer.sh\"" \
  "" \
  "Toggle sync"     "S"  "setw synchronize-panes" \
  "Toggle logging"  "P"  "pipe-pane -o \"cat >> \$HOME/.tmux/logs/#{session_name}-#{window_index}.log\"" \
  "Zoom pane"       "z"  "resize-pane -Z" \
  "" \
  "Save sessions"   "C-s" "run-shell \"~/.tmux/scripts/save-sessions.sh\"" \
  "Restore sessions" "C-r" "run-shell \"~/.tmux/scripts/restore-sessions.sh\"" \
  "Reload config"   "r"  "source-file ~/.tmux.conf" \
  "Cheatsheet"      "I"  "display-popup -E -w 80% -h 80% \"~/.tmux/scripts/cheatsheet.sh\"" \
  "Kill pane"       "x"  "confirm-before -p \"kill pane #P? (y/n)\" kill-pane"

# ------------------------------------------------------------------------------
# Quality-of-life
# ------------------------------------------------------------------------------

# New windows open in the current pane's directory (splits already do this)
bind -N "new window in current path" c new-window -c "#{pane_current_path}"

# Mouse drag-select copies to the system clipboard (matches y / Enter)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "$HOME/.tmux/scripts/clipboard.sh"

# Update the iTerm tab/title with session, window, and running command
set -g set-titles on
set -g set-titles-string "#S  #I:#W  #{pane_current_command}"

# Keep windows full-size for every attached client, and mark windows with new
# output (a subtle flag in the tab) without flashing a status message
setw -g aggressive-resize on
setw -g monitor-activity on
set -g visual-activity off

# Longer on-screen time for messages and the pane-number overlay (Prefix + q)
set -g display-time 2000
set -g display-panes-time 2000

# ------------------------------------------------------------------------------
# Inception Mode (Nested Tmux)
# ------------------------------------------------------------------------------

# F12 : Toggle outer tmux keybindings off to interact with nested tmux
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "bg=#f38ba8,fg=#1e1e2e" \;\
  set window-status-current-style "bg=#1e1e2e,fg=#f38ba8,bold" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-style \;\
  refresh-client -S

# Undercurl support for Neovim/Vim diagnostics
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# ------------------------------------------------------------------------------
# Easter Egg
# ------------------------------------------------------------------------------
bind -N "Party Parrot Easter Egg" E \
  display-popup -E -w 80% -h 80% "~/.tmux/scripts/parrot.sh"

# ==============================================================================
# 6. PLUGINS
# ==============================================================================

# Change TPM install key from 'I' to 'T' to prevent conflict with the cheatsheet
set -g @tpm-install 'T'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'fcsonline/tmux-fingers'
# tmux-fingers adds hint-based copying using fzf-like shortcuts
set -g @fingers-key F
# Skip tmux-fingers health check: its version parser mis-reads suffixed
# tmux versions (e.g. 3.6b), firing a bogus "tmux 2.2+ recommended" warning
set -g @fingers-skip-health-check '1'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# ==============================================================================
# 7. LOCAL OVERRIDES & STARTUP HOOKS
# ==============================================================================

# Hook to show changelog or cheatsheet on first startup after install/update
set-hook -g client-attached 'run-shell "~/.tmux/scripts/on-startup.sh"'

# If you want to override any settings, add them to ~/.tmux.conf.local
# This prevents your changes from being overwritten by 'tmux-mgr update'
if-shell "[ -f ~/.tmux.conf.local ]" 'source ~/.tmux.conf.local'
