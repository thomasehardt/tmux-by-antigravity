# ==============================================================================
# Tmux Configuration
# ==============================================================================
# This file is tracked in version control.
# See README.md for the decision log and rationale for these settings.

# ==========================================
# General Settings
# ==========================================

# Enable mouse support (clickable windows, panes, resizable panes)
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 10000

# Start window and pane numbering at 1 (instead of 0) for easier reach
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Remove delay for exiting insert mode with ESC in Neovim/Vim
set -sg escape-time 10

# Enable true color support
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"

# ==========================================
# Key Bindings
# ==========================================

# Change prefix from 'Ctrl-b' to 'Ctrl-a' (easier to type)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Easier and more intuitive window splitting
# Also open new panes in the current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Use Vi keys in copy mode
set-window-option -g mode-keys vi

# ==========================================
# Copy Mode & Clipboard
# ==========================================

# Setup 'v' to begin selection, just like Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Setup 'y' to yank (copy) and pipe to system clipboard (requires xclip)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Vim-like pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-like pane resizing (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Easy config reload (Prefix + r)
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ==========================================
# Theme & Status Bar (Sleek Modern Design)
# ==========================================

# Status bar colors (Catppuccin Mocha inspired)
set -g status-bg "#1e1e2e" # Deep dark gray/blue
set -g status-fg "#cdd6f4" # Light gray

# Active window title color
set-window-option -g window-status-current-style bg="#89b4fa",fg="#1e1e2e",bold

# Inactive window title color
set-window-option -g window-status-style fg="#a6adc8"

# Pane border colors
set -g pane-border-style fg="#313244"
set -g pane-active-border-style fg="#89b4fa"

# Status left and right styling
set -g status-left-length 40
set -g status-left "#[fg=#89b4fa,bold] ❐ #S #[fg=#6c7086]│ "
set -g status-right "#[fg=#a6adc8]%Y-%m-%d %H:%M "
